services:
  web:
    build:
      context: .
      dockerfile: compose/django/Dockerfile.production
    command: /start.sh
    volumes:
      - epocha_static:/app/staticfiles
    expose:
      - "8000"
    env_file:
      - .envs/.production/.django
      - .envs/.production/.postgres
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./compose/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - epocha_static:/app/staticfiles:ro
    ports:
      - "80:80"
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - epocha_postgres_data:/var/lib/postgresql/data
      - epocha_postgres_backup:/backups
    env_file:
      - .envs/.production/.postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - epocha_redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: compose/django/Dockerfile.production
    command: /start-celery.sh
    env_file:
      - .envs/.production/.django
      - .envs/.production/.postgres
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 120s  # Allow current tick to complete before stopping
    deploy:
      resources:
        limits:
          memory: 1G

  celery-beat:
    build:
      context: .
      dockerfile: compose/django/Dockerfile.production
    command: /start-celerybeat.sh
    env_file:
      - .envs/.production/.django
      - .envs/.production/.postgres
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  epocha_postgres_data:
  epocha_postgres_backup:
  epocha_redis_data:
  epocha_static:
