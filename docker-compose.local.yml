services:
  web:
    build:
      context: .
      dockerfile: compose/django/Dockerfile
    command: /start.sh
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - RUN_MIGRATIONS=true
    env_file:
      - .envs/.local/.django
      - .envs/.local/.postgres
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    volumes:
      - epocha_postgres_data:/var/lib/postgresql/data
    env_file:
      - .envs/.local/.postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery-worker:
    build:
      context: .
      dockerfile: compose/django/Dockerfile
    command: /bin/bash compose/celery/start.sh
    volumes:
      - .:/app
    env_file:
      - .envs/.local/.django
      - .envs/.local/.postgres
    depends_on:
      - web
      - redis
    stop_grace_period: 60s  # Allow current tick to complete before stopping

  celery-beat:
    build:
      context: .
      dockerfile: compose/django/Dockerfile
    command: /bin/bash compose/celerybeat/start.sh
    volumes:
      - .:/app
    env_file:
      - .envs/.local/.django
      - .envs/.local/.postgres
    depends_on:
      - web
      - redis

volumes:
  epocha_postgres_data:
