{% extends "dashboard/base.html" %}
{% block title %}Register - Epocha{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-6">Create Account</h1>

    {% if errors %}
    <div class="bg-red-900/50 border border-red-500 rounded p-3 mb-4">
        {% for error in errors %}<p class="text-red-300 text-sm">{{ error }}</p>{% endfor %}
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm text-gray-400 mb-1">Email</label>
            <input type="email" name="email" required class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-indigo-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Username</label>
            <input type="text" name="username" required class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-indigo-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Password</label>
            <input type="password" name="password" required minlength="8" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-indigo-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Confirm Password</label>
            <input type="password" name="password_confirm" required class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-white focus:border-indigo-500 focus:outline-none">
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 rounded">Register</button>
    </form>

    <p class="mt-4 text-sm text-gray-400">Already have an account? <a href="{% url 'dashboard:login' %}" class="text-indigo-400 hover:text-indigo-300">Login</a></p>
</div>
{% endblock %}
