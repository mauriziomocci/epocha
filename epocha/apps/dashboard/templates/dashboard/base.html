<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Epocha{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Nav -->
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{% url 'dashboard:home' %}" class="text-xl font-bold text-indigo-400">Epocha</a>
            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                    <span class="text-sm text-gray-400">{{ user.email }}</span>
                    <a href="{% url 'dashboard:logout' %}" class="text-sm text-red-400 hover:text-red-300">Logout</a>
                {% else %}
                    <a href="{% url 'dashboard:login' %}" class="text-sm text-indigo-400 hover:text-indigo-300">Login</a>
                    <a href="{% url 'dashboard:register' %}" class="text-sm text-indigo-400 hover:text-indigo-300">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
